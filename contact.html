<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div><a href="index.html">E-Shop</a></div>
  <div>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="search.html">Search</a>
  </div>
</div>

<div class="main-content">
  <div class="container">
    <h2>Contact Us</h2>

    <form id="contactForm" class="contact-form">
      
      <div class="form-group">
        <input type="text" id="name" placeholder="Your Name" required>
      </div>

      <div class="form-group">
        <input type="email" id="email" placeholder="Your Email" required>
      </div>

      <div class="form-group">
        <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
      </div>

      <button type="submit" class="btn">Submit</button>

      <p id="formMessage"></p>

    </form>

  </div>
</div>

<div class="footer">© 2026 E-Shop</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if(name === "" || email === "" || message === ""){
    document.getElementById("formMessage").innerHTML = "Please fill all fields.";
    document.getElementById("formMessage").style.color = "red";
  } else {
    document.getElementById("formMessage").innerHTML = "Form submitted successfully!";
    document.getElementById("formMessage").style.color = "green";
  }
});
</script>

</body>
</html>
